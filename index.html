<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Elisa 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  font-family:'Dancing Script', cursive;
  color:white;
}

/* pantalla clave */
.lock{
  text-align:center;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  font-size:1em;
  text-align:center;
}

button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff4b5c;
  cursor:pointer;
}

/* libro */
.book{
  display:none;
  width:300px;
  height:400px;
  position:relative;
  perspective:1500px;
}

.page{
  width:100%;
  height:100%;
  position:absolute;
  background:white;
  color:#ff4b5c;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  transform-origin:left;
  transition:transform 1s;
  cursor:pointer;
}

.page.flipped{
  transform:rotateY(-180deg);
}

.page:nth-child(1){z-index:6;}
.page:nth-child(2){z-index:5;}
.page:nth-child(3){z-index:4;}
.page:nth-child(4){z-index:3;}
.page:nth-child(5){z-index:2;}
.page:nth-child(6){z-index:1;}
</style>
</head>

<body>

<div class="lock" id="lock">
  <h1>🔒 Nuestra fecha 💖</h1>
  <p>Ingresa la fecha especial 😍</p>
  <input id="clave" placeholder="05/02/2026">
  <br>
  <button onclick="abrir()">Abrir 💌</button>
  <p id="error"></p>
</div>

<div class="book" id="book">

  <div class="page" onclick="pasar(this)">
    <h2>💖 Elisa 💖<br><br>Toca para comenzar 📖</h2>
  </div>

  <div class="page" onclick="pasar(this)">
    <p>Desde el 05/02/2026... mi vida cambió 💕</p>
  </div>

  <div class="page" onclick="pasar(this)">
    <p>Eres mi sonrisa diaria 😍<br>Mi lugar favorito ❤️</p>
  </div>

  <div class="page" onclick="pasar(this)">
    <p>Contigo aprendí lo que es amar de verdad 💖</p>
  </div>

  <div class="page" onclick="pasar(this)">
    <p>No importa el tiempo...<br>Siempre serás tú 💕</p>
  </div>

  <div class="page" onclick="pasar(this)">
    <h2>Te amo Elisa ❤️<br>Para toda la vida 💍</h2>
  </div>

</div>

<script>
function abrir(){
  let clave = document.getElementById("clave").value;
  
  if(clave === "05/02/2026"){
    document.getElementById("lock").style.display="none";
    document.getElementById("book").style.display="block";
  }else{
    document.getElementById("error").innerHTML="❌ Fecha incorrecta 😢";
  }
}

function pasar(p){
  p.classList.toggle("flipped");
}
</script>

</body>
</html>
