<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi niña 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff9a9e,#fecfef,#fad0c4);
  font-family:'Pacifico', cursive;
  overflow:hidden;
}

/* corazones */
.heart{
  position:absolute;
  color:#ff4b5c;
  animation: subir 6s linear infinite;
}

@keyframes subir{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

/* pantalla */
.lock{
  text-align:center;
  background:rgba(255,255,255,0.3);
  padding:30px;
  border-radius:25px;
}

input{
  padding:15px;
  border:none;
  border-radius:20px;
  font-size:1.2em;
  text-align:center;
}

button{
  margin-top:15px;
  padding:15px 25px;
  border:none;
  border-radius:30px;
  background:#ff4b5c;
  color:white;
  font-size:1.2em;
}

/* libro */
.book{
  display:none;
  width:320px;
  height:450px;
  position:relative;
  perspective:1500px;
}

.page{
  width:100%;
  height:100%;
  position:absolute;
  background:#fff0f5;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:25px;
  font-size:1.6em;
  color:#ff4b5c;
  transform-origin:left;
  transition:transform 1s;
}

.page.flipped{
  transform:rotateY(-180deg);
}
</style>
</head>

<body>

<div class="lock" id="lock">
  <h1>🧸 Hola mi niña preciosa 💖</h1>
  <p>Soy Abner... escribe nuestra fecha 😍</p>
  <input id="clave" placeholder="dd/mm/yyyy">
  <br>
  <button onclick="abrir()">💌 Abrir</button>
  <p id="error"></p>
</div>

<div class="book" id="book">

<div class="page" onclick="pasar(this)">💖 Elisa, toca mi amor 📖</div>
<div class="page" onclick="pasar(this)">Eres lo mejor que me pasó 💕</div>
<div class="page" onclick="pasar(this)">Mi niña bonita 😍</div>
<div class="page" onclick="pasar(this)">Te amo muchísimo 💖</div>
<div class="page" onclick="pasar(this)">Siempre contigo 💕</div>
<div class="page" onclick="pasar(this)">Eres mi todo ❤️</div>

</div>

<script>
function abrir(){
  let clave=document.getElementById("clave").value;
  if(clave==="05/02/2026"){
    document.getElementById("lock").style.display="none";
    document.getElementById("book").style.display="block";
  }else{
    document.getElementById("error").innerHTML="❌ Intenta otra vez 💔";
  }
}

function pasar(p){
  p.classList.toggle("flipped");
}

function corazones(){
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>{h.remove();},6000);
}
setInterval(corazones,300);
</script>

</body>
</html>
