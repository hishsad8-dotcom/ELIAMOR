<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi niña 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:pink;
  font-family:Arial;
}
.phone{
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
}
.book{
  display:none;
}
</style>
</head>

<body>

<div class="phone" id="lock">
  <h2>💖 Mi niña preciosa</h2>
  <input id="clave" placeholder="dd/mm/yyyy">
  <br>
  <button onclick="abrir()">Abrir 💌</button>
  <p id="error"></p>
</div>

<div class="book" id="book">
  <h2>🥺❤️ ay mi bebe así me gusta que si sepas nuestra fecha</h2>
  <p>Te amo Elisa 💖</p>
</div>

<script>
function abrir(){
  let c=document.getElementById("clave").value;
  if(c==="05/02/2026"){
    document.getElementById("lock").style.display="none";
    document.getElementById("book").style.display="block";
  }else{
    document.getElementById("error").innerHTML="😔 amor enserio te esta olvidando...";
  }
}
</script>

</body>
</html>
